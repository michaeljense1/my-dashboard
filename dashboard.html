<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f2ed;
      --surface: #ffffff;
      --border: #e2ddd6;
      --text: #1a1714;
      --muted: #8a847c;
      --accent: #c84b2f;
      --accent2: #2f6ec8;
      --mono: 'DM Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      padding: 32px 24px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 32px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
    }

    header h1 {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    #clock {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto;
      gap: 16px;
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
      animation: fadeUp 0.4s ease both;
    }

    .card:nth-child(1) { animation-delay: 0.05s; grid-column: 1 / -1; }
    .card:nth-child(2) { animation-delay: 0.1s; }
    .card:nth-child(3) { animation-delay: 0.15s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 18px;
    }

    /* ── WEATHER ── */
    .weather-main {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      margin-bottom: 14px;
    }

    .weather-temp {
      font-family: var(--mono);
      font-size: 52px;
      font-weight: 300;
      line-height: 1;
    }

    .weather-desc {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .weather-details {
      display: flex;
      gap: 20px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      border-top: 1px solid var(--border);
      padding-top: 14px;
    }

    .weather-details span b {
      color: var(--text);
      font-weight: 500;
    }

    /* ── NBA ── */
    .game {
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .game:last-child { border-bottom: none; padding-bottom: 0; }
    .game:first-child { padding-top: 0; }

    .game-teams {
      font-size: 13px;
      line-height: 1.6;
    }

    .game-teams .team { display: flex; gap: 6px; align-items: center; }
    .game-teams .team.winner { font-weight: 500; }

    .game-score {
      font-family: var(--mono);
      font-size: 13px;
      text-align: right;
      line-height: 1.6;
    }

    .game-score .score.winner { font-weight: 500; }

    .game-status {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--accent);
      text-align: right;
      min-width: 48px;
    }

    .game-status.final { color: var(--muted); }

    /* ── TRANSIT ── */
    .transit-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }

    .route-card {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px;
    }

    .route-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .route-badge {
      background: var(--accent2);
      color: white;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 4px;
    }

    .route-name {
      font-size: 12px;
      color: var(--muted);
    }

    .departure {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
    }

    .departure .time { color: var(--text); }
    .departure .delay { color: var(--accent); }
    .departure .ontime { color: #2a8a4a; }

    .no-data {
      color: var(--muted);
      font-size: 13px;
      font-family: var(--mono);
    }

    .refresh-btn {
      display: block;
      margin: 28px auto 0;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 8px 20px;
      border-radius: 4px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .refresh-btn:hover { border-color: var(--text); color: var(--text); }

    .loading {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
    }

    .dot-flash::after {
      content: '...';
      animation: dots 1.2s steps(4, end) infinite;
    }

    @keyframes dots {
      0%, 20%  { content: '.'; }
      40%      { content: '..'; }
      60%,100% { content: '...'; }
    }

    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
      .card:nth-child(1) { grid-column: 1; }
    }
  </style>
</head>
<body>

<header>
  <h1>My Dashboard &mdash; South Bend, IN</h1>
  <span id="clock"></span>
</header>

<!-- API KEY BANNER -->
<div id="api-key-banner" style="max-width:900px; margin:0 auto 20px; background:#fff; border:1px solid var(--border); border-radius:8px; padding:16px 20px; display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
  <div style="font-family:var(--mono); font-size:11px; color:var(--muted); letter-spacing:0.08em; white-space:nowrap;">ANTHROPIC API KEY</div>
  <input id="api-key-input" type="password" placeholder="sk-ant-..." autocomplete="off" spellcheck="false"
    style="flex:1; min-width:220px; font-family:var(--mono); font-size:12px; border:1px solid var(--border);
           border-radius:4px; padding:7px 10px; background:var(--bg); color:var(--text); outline:none;"
    onkeydown="if(event.key==='Enter') saveKey()">
  <button onclick="saveKey()"
    style="font-family:var(--mono); font-size:11px; letter-spacing:0.08em; text-transform:uppercase;
           background:var(--text); color:#fff; border:none; border-radius:4px; padding:8px 16px; cursor:pointer;">
    Save &amp; Load
  </button>
  <div id="key-status" style="font-family:var(--mono); font-size:11px; color:var(--muted);"></div>
</div>

<div class="grid">

  <!-- SPORTS -->
  <div class="card" id="sports-card" style="grid-column: 1 / -1;">
    <div class="card-label">Sports</div>
    <div class="loading dot-flash">Loading</div>
  </div>

  <!-- WEATHER -->
  <div class="card" id="weather-card">
    <div class="card-label">Weather</div>
    <div class="loading dot-flash">Loading</div>
  </div>

  <!-- TRANSIT -->
  <div class="card" id="transit-card">
    <div class="card-label">Transpo — South Bend</div>
    <div class="loading dot-flash">Checking for alerts</div>
  </div>

  <!-- SCRIPTURE NT -->
  <div class="card" id="scripture-nt-card">
    <div class="card-label">New Testament — Verse of the Day</div>
    <div class="loading dot-flash">Loading</div>
  </div>

  <!-- SCRIPTURE BOM -->
  <div class="card" id="scripture-bom-card">
    <div class="card-label">Book of Mormon — Verse of the Day</div>
    <div class="loading dot-flash">Loading</div>
  </div>

  <!-- MTG CARD OF THE DAY -->
  <div class="card" id="mtg-card" style="grid-column: 1 / -1;">
    <div class="card-label">Card of the Day — Rebecca Guay</div>
    <div class="loading dot-flash">Loading</div>
  </div>

</div>

<button class="refresh-btn" onclick="loadAll()">↻ &nbsp;Refresh</button>

<script>
// ── API KEY ─────────────────────────────────────────────
window._anthropicKey = '';

function saveKey() {
  const val = document.getElementById('api-key-input').value.trim();
  if (!val.startsWith('sk-ant-')) {
    document.getElementById('key-status').textContent = '⚠ Looks invalid — should start with sk-ant-';
    document.getElementById('key-status').style.color = 'var(--accent)';
    return;
  }
  window._anthropicKey = val;
  document.getElementById('key-status').textContent = '✓ Key saved';
  document.getElementById('key-status').style.color = '#2a8a4a';
  document.getElementById('api-key-input').value = '••••••••••••••••';
  loadAll();
}


function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' }) +
    ' · ' +
    now.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
}
updateClock();
setInterval(updateClock, 1000);

// ── WEATHER (Open-Meteo, no key needed) ────────────────
async function loadWeather() {
  const card = document.getElementById('weather-card');
  try {
    // South Bend, IN coords
    const lat = 41.6764, lon = -86.2520;
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`
      + `&current=temperature_2m,apparent_temperature,weathercode,windspeed_10m,relativehumidity_2m`
      + `&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max`
      + `&temperature_unit=fahrenheit&windspeed_unit=mph&timezone=America%2FChicago`;
    const res  = await fetch(url);
    const data = await res.json();
    const c    = data.current;
    const d    = data.daily;

    const descriptions = {
      0:'Clear', 1:'Mainly clear', 2:'Partly cloudy', 3:'Overcast',
      45:'Foggy', 48:'Freezing fog',
      51:'Light drizzle', 53:'Drizzle', 55:'Heavy drizzle',
      61:'Light rain', 63:'Rain', 65:'Heavy rain',
      71:'Light snow', 73:'Snow', 75:'Heavy snow', 77:'Snow grains',
      80:'Showers', 81:'Showers', 82:'Heavy showers',
      85:'Snow showers', 86:'Heavy snow showers',
      95:'Thunderstorm', 96:'Thunderstorm', 99:'Thunderstorm',
    };

    const icons = {
      0:'☀️', 1:'🌤️', 2:'⛅', 3:'☁️',
      45:'🌫️', 48:'🌫️',
      51:'🌦️', 53:'🌦️', 55:'🌧️',
      61:'🌧️', 63:'🌧️', 65:'🌧️',
      71:'🌨️', 73:'🌨️', 75:'❄️', 77:'🌨️',
      80:'🌦️', 81:'🌦️', 82:'🌧️',
      85:'🌨️', 86:'❄️',
      95:'⛈️', 96:'⛈️', 99:'⛈️',
    };

    const desc = descriptions[c.weathercode] || 'Unknown';
    const icon = icons[c.weathercode] || '🌡️';

    // Build 7-day forecast rows (skip today at index 0, show next 6 days)
    let forecastHtml = '';
    for (let i = 1; i < Math.min(7, d.time.length); i++) {
      const date     = new Date(d.time[i] + 'T12:00:00');
      const dayName  = date.toLocaleDateString('en-US', { weekday: 'short' });
      const dayIcon  = icons[d.weathercode[i]] || '🌡️';
      const hi       = Math.round(d.temperature_2m_max[i]);
      const lo       = Math.round(d.temperature_2m_min[i]);
      const precip   = d.precipitation_probability_max[i];
      forecastHtml += `
        <div style="display:flex; align-items:center; gap:8px; padding:5px 0; border-top:1px solid var(--border);">
          <span style="font-family:var(--mono); font-size:11px; color:var(--muted); width:28px;">${dayName}</span>
          <span style="font-size:14px; width:22px;">${dayIcon}</span>
          <span style="font-family:var(--mono); font-size:11px; flex:1; color:var(--muted);">${descriptions[d.weathercode[i]] || ''}</span>
          ${precip >= 20 ? `<span style="font-family:var(--mono); font-size:10px; color:var(--accent2);">💧${precip}%</span>` : ''}
          <span style="font-family:var(--mono); font-size:11px; color:var(--text); white-space:nowrap;">${hi}° <span style="color:var(--muted)">${lo}°</span></span>
        </div>`;
    }

    card.innerHTML = `
      <div class="card-label">Weather &mdash; South Bend</div>
      <div class="weather-main">
        <div class="weather-temp">${icon} ${Math.round(c.temperature_2m)}<span style="font-size:24px">°F</span></div>
        <div>
          <div class="weather-desc">${desc}</div>
          <div class="weather-desc">Feels like ${Math.round(c.apparent_temperature)}°F</div>
        </div>
      </div>
      <div class="weather-details">
        <span><b>${c.relativehumidity_2m}%</b> humidity</span>
        <span><b>${Math.round(c.windspeed_10m)} mph</b> wind</span>
      </div>
      <div style="margin-top:14px;">${forecastHtml}</div>`;
  } catch(e) {
    card.innerHTML = `<div class="card-label">Weather</div><div class="no-data">Could not load weather.</div>`;
  }
}

// ── SPORTS (AI-powered, all 4 teams) ───────────────────
async function loadSports() {
  const card = document.getElementById('sports-card');
  card.innerHTML = `<div class="card-label">Sports</div><div class="loading dot-flash">Searching for scores & headlines</div>`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": window._anthropicKey || '',
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 2000,
        tools: [{ type: "web_search_20250305", name: "web_search" }],
        system: `You are a sports update assistant. Search for the latest info on specific teams and return ONLY a JSON object — no markdown, no backticks, no explanation whatsoever.

Return this exact structure:
{
  "teams": [
    {
      "name": "Detroit Pistons",
      "sport": "NBA",
      "lastGame": {
        "result": "W" or "L" or null,
        "summary": "e.g. Beat the Celtics 112–98 (Apr 30)",
        "notePlayed": true or false
      },
      "nextGame": "e.g. vs Lakers, May 6" or null,
      "headlines": ["headline 1", "headline 2"]
    }
  ]
}

Cover these 4 teams in order: Detroit Pistons (NBA), Notre Dame Fighting Irish Football (NCAAF), BYU Cougars Football (NCAAF), BYU Cougars Basketball (NCAAB).
For each: find the most recent game score/result, the next upcoming game if known, and 1–2 short notable headlines (injuries, rankings, coaching news, etc). If it's off-season for a sport, note that briefly in nextGame.`,
        messages: [{
          role: "user",
          content: `Today is ${new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' })}. Search for the latest scores, results, and news for: Detroit Pistons, Notre Dame Football, BYU Football, BYU Basketball. Return only the JSON.`
        }]
      })
    });

    const data = await response.json();
    const textBlock = data.content.find(b => b.type === 'text');
    const raw = textBlock ? textBlock.text.trim() : '';

    let result;
    try {
      const clean = raw.replace(/```json|```/g, '').trim();
      result = JSON.parse(clean);
    } catch {
      throw new Error('Parse failed: ' + raw.slice(0, 200));
    }

    const teams = result.teams || [];

    const resultColors = { 'W': '#2a8a4a', 'L': '#c84b2f' };

    let html = `<div class="card-label">Sports — Latest</div>
      <div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap:14px;">`;

    teams.forEach(team => {
      const resColor = team.lastGame?.result ? resultColors[team.lastGame.result] || 'var(--muted)' : 'var(--muted)';
      const resBadge = team.lastGame?.result
        ? `<span style="font-family:var(--mono); font-size:11px; font-weight:600; color:${resColor}; background:${resColor}18; padding:1px 7px; border-radius:3px;">${team.lastGame.result}</span>`
        : '';

      html += `
        <div style="border:1px solid var(--border); border-radius:6px; padding:14px;">
          <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px;">
            <div style="font-size:13px; font-weight:500;">${team.name}</div>
            <div style="font-family:var(--mono); font-size:10px; color:var(--muted);">${team.sport}</div>
          </div>

          ${team.lastGame?.summary ? `
          <div style="display:flex; align-items:center; gap:6px; margin-bottom:6px;">
            ${resBadge}
            <div style="font-size:12px; color:var(--text);">${team.lastGame.summary}</div>
          </div>` : ''}

          ${team.nextGame ? `
          <div style="font-family:var(--mono); font-size:11px; color:var(--muted); margin-bottom:8px;">
            Next: ${team.nextGame}
          </div>` : ''}

          ${team.headlines?.length ? `
          <div style="border-top:1px solid var(--border); padding-top:8px; margin-top:4px;">
            ${team.headlines.map(h => `
              <div style="font-size:11px; color:var(--muted); padding:2px 0; line-height:1.4;">· ${h}</div>
            `).join('')}
          </div>` : ''}
        </div>`;
    });

    html += `</div>`;
    card.innerHTML = html;

  } catch(e) {
    card.innerHTML = `<div class="card-label">Sports</div><div class="no-data">Could not load sports data. Check console for details.</div>`;
    console.error('Sports load error:', e);
  }
}

// ── TRANSIT (AI-powered alert checker) ─────────────────
async function loadTransit() {
  const card = document.getElementById('transit-card');
  card.innerHTML = `<div class="card-label">Transpo — South Bend</div><div class="loading dot-flash">Checking for alerts</div>`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": window._anthropicKey || '',
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        tools: [{ type: "web_search_20250305", name: "web_search" }],
        system: `You check the South Bend Transpo website for service alerts about routes not running.
Respond ONLY with a JSON object, no markdown, no backticks, no explanation.
Format:
{
  "alerts": [
    { "route": "Route 5", "message": "Not running today due to maintenance" }
  ],
  "allClear": true or false,
  "checkedAt": "source note e.g. sbtranspo.com"
}
If there are no alerts, return allClear: true and an empty alerts array.
If you cannot reach the site or determine status, return allClear: null and explain briefly in a single alert message.`,
        messages: [{
          role: "user",
          content: `Search sbtranspo.com right now for any active service alerts or route suspensions. Today is ${new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' })}. Return only the JSON.`
        }]
      })
    });

    const data = await response.json();

    // Extract text from response (may come after tool_use blocks)
    const textBlock = data.content.find(b => b.type === 'text');
    const raw = textBlock ? textBlock.text.trim() : '';

    let result;
    try {
      const clean = raw.replace(/```json|```/g, '').trim();
      result = JSON.parse(clean);
    } catch {
      result = { allClear: null, alerts: [{ route: 'Unknown', message: raw || 'Could not parse response.' }] };
    }

    let html = `<div class="card-label">Transpo — South Bend</div>`;

    if (result.allClear === true) {
      html += `
        <div style="display:flex; align-items:center; gap:10px; padding: 8px 0;">
          <span style="font-size:20px">✅</span>
          <div>
            <div style="font-size:14px; font-weight:500;">All routes running normally</div>
            <div style="font-family:var(--mono); font-size:11px; color:var(--muted); margin-top:3px;">No alerts on sbtranspo.com</div>
          </div>
        </div>`;
    } else if (result.allClear === false && result.alerts.length) {
      html += result.alerts.map(a => `
        <div style="display:flex; gap:10px; padding:10px 0; border-bottom:1px solid var(--border);">
          <span style="font-size:18px; flex-shrink:0;">⚠️</span>
          <div>
            <div style="font-size:13px; font-weight:500; color:var(--accent);">${a.route}</div>
            <div style="font-size:13px; color:var(--text); margin-top:2px;">${a.message}</div>
          </div>
        </div>`).join('');
    } else {
      html += `
        <div style="display:flex; align-items:center; gap:10px; padding: 8px 0;">
          <span style="font-size:18px">❓</span>
          <div style="font-family:var(--mono); font-size:12px; color:var(--muted);">
            ${result.alerts?.[0]?.message || 'Could not determine alert status.'}
          </div>
        </div>`;
    }

    html += `<div style="margin-top:14px; font-family:var(--mono); font-size:11px; color:var(--muted);">
      <a href="https://www.sbtranspo.com" target="_blank" style="color:var(--accent2);">sbtranspo.com ↗</a>
    </div>`;

    card.innerHTML = html;

  } catch(e) {
    card.innerHTML = `<div class="card-label">Transpo — South Bend</div>
      <div class="no-data">Could not check alerts. <a href="https://www.sbtranspo.com" target="_blank" style="color:var(--accent2);">Visit sbtranspo.com ↗</a></div>`;
  }
}

// ── SCRIPTURE — NEW TESTAMENT (labs.bible.org) ─────────
async function loadScriptureNT() {
  const card = document.getElementById('scripture-nt-card');
  try {
    // labs.bible.org: free, no key, CORS-enabled, NET translation
    const res  = await fetch('https://labs.bible.org/api/?passage=random&type=json&testament=n');
    const data = await res.json();
    if (!Array.isArray(data) || !data.length) throw new Error('No data');
    const v    = data[0];
    const ref  = `${v.bookname} ${v.chapter}:${v.verse}`;
    const text = v.text.replace(/<[^>]*>/g, '').trim();
    card.innerHTML = `
      <div class="card-label">New Testament — Verse of the Day</div>
      <div style="font-size:14px; line-height:1.7; color:var(--text); margin-bottom:12px;">"${text}"</div>
      <div style="font-family:var(--mono); font-size:11px; color:var(--muted);">— ${ref} <span style="opacity:0.5;">(NET)</span></div>`;
  } catch(e) {
    card.innerHTML = `<div class="card-label">New Testament — Verse of the Day</div><div class="no-data">Could not load verse.</div>`;
  }
}

// ── MTG CARD OF THE DAY (Scryfall, no key needed) ──────
async function loadMTGCard() {
  const card = document.getElementById('mtg-card');
  try {
    const res  = await fetch('https://api.scryfall.com/cards/random?q=a%3A%22Rebecca+Guay%22', {
      headers: { 'Accept': 'application/json', 'User-Agent': 'PersonalDashboard/1.0' }
    });
    const data = await res.json();
    if (data.object === 'error') throw new Error(data.details);

    // Art crop preferred; fall back to normal image
    const imgUrl  = data.image_uris?.art_crop || data.image_uris?.normal
                 || data.card_faces?.[0]?.image_uris?.art_crop
                 || data.card_faces?.[0]?.image_uris?.normal;
    const fullImg = data.image_uris?.normal || data.card_faces?.[0]?.image_uris?.normal;

    const name     = data.name || 'Unknown';
    const typeLine = data.type_line || '';
    const manaCost = data.mana_cost || '';
    const oracleText = (data.oracle_text || data.card_faces?.[0]?.oracle_text || '')
      .replace(/\n/g, '<br>');
    const set      = data.set_name || '';
    const year     = data.released_at ? data.released_at.slice(0,4) : '';
    const scryfallUrl = data.scryfall_uri || `https://scryfall.com/card/${data.id}`;

    card.innerHTML = `
      <div class="card-label">Card of the Day — Rebecca Guay</div>
      <div style="display:flex; gap:24px; align-items:flex-start; flex-wrap:wrap;">

        <a href="${scryfallUrl}" target="_blank" style="flex-shrink:0;">
          <img src="${imgUrl}" alt="${name}"
            style="width:260px; border-radius:6px; display:block; box-shadow:0 4px 16px rgba(0,0,0,0.12);"
            onerror="this.src='${fullImg}'; this.onerror=null;">
        </a>

        <div style="flex:1; min-width:180px;">
          <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px;">
            <div style="font-size:18px; font-weight:500;">${name}</div>
            <div style="font-family:var(--mono); font-size:13px; color:var(--muted);">${manaCost}</div>
          </div>
          <div style="font-family:var(--mono); font-size:11px; color:var(--muted); margin-bottom:12px;">${typeLine}</div>
          ${oracleText ? `<div style="font-size:13px; line-height:1.65; color:var(--text); margin-bottom:16px; padding:12px; background:var(--bg); border-radius:5px;">${oracleText}</div>` : ''}
          <div style="font-family:var(--mono); font-size:11px; color:var(--muted);">
            ${set}${year ? ' · ' + year : ''}<br>
            <span style="opacity:0.7;">Art by Rebecca Guay · © Wizards of the Coast</span>
          </div>
          <a href="${scryfallUrl}" target="_blank"
            style="display:inline-block; margin-top:14px; font-family:var(--mono); font-size:11px;
                   color:var(--accent2); text-decoration:none; letter-spacing:0.06em;">
            View on Scryfall ↗
          </a>
        </div>

      </div>`;
  } catch(e) {
    card.innerHTML = `<div class="card-label">Card of the Day — Rebecca Guay</div>
      <div class="no-data">Could not load card. <a href="https://scryfall.com/search?q=a%3A%22Rebecca+Guay%22" target="_blank" style="color:var(--accent2);">Browse on Scryfall ↗</a></div>`;
  }
}

// ── LOAD ALL ────────────────────────────────────────────
const NO_KEY_MSG = `<div class="card-label">API Key Required</div>
  <div style="font-family:var(--mono); font-size:12px; color:var(--muted); line-height:1.7;">
    Enter your Anthropic API key above to load this card.<br>
    Get one free at <a href="https://console.anthropic.com" target="_blank" style="color:var(--accent2);">console.anthropic.com</a>
  </div>`;

function loadAll() {
  const hasKey = !!window._anthropicKey;

  // Always load non-AI cards
  document.getElementById('weather-card').innerHTML     = '<div class="card-label">Weather</div><div class="loading dot-flash">Loading</div>';
  document.getElementById('scripture-nt-card').innerHTML  = '<div class="card-label">New Testament</div><div class="loading dot-flash">Loading</div>';
  document.getElementById('scripture-bom-card').innerHTML = '<div class="card-label">Book of Mormon</div><div class="loading dot-flash">Loading</div>';
  document.getElementById('mtg-card').innerHTML           = '<div class="card-label">Card of the Day — Rebecca Guay</div><div class="loading dot-flash">Loading</div>';
  loadWeather();
  loadScriptureNT();
  loadScriptureBOM();
  loadMTGCard();

  // AI cards need a key
  if (hasKey) {
    document.getElementById('sports-card').innerHTML    = '<div class="card-label">Sports</div><div class="loading dot-flash">Searching…</div>';
    document.getElementById('transit-card').innerHTML   = '<div class="card-label">Transpo</div><div class="loading dot-flash">Checking…</div>';
    loadSports();
    loadTransit();
  } else {
    document.getElementById('sports-card').innerHTML  = NO_KEY_MSG;
    document.getElementById('transit-card').innerHTML = NO_KEY_MSG;
  }
}

loadAll();
